<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Mapping Design Experiment</title>

<script src="https://unpkg.com/konva@10/konva.min.js"></script>

    <link rel="stylesheet" href="../reset.css">
    <link rel="stylesheet" href="mappingStyle.css">
    <script src="mappingMain.js" defer></script>
</head>
<body>

<main>

<!-- In this experient, existing two different kinds of mapping.-->
<!-- The first one is the button which can create a circle. This is a weak mapping, because when users press the button -->
<!-- the website will generate a random circle for user, then users might be a bit confused about it. User could not know -->
<!-- where and what size the circle will exactly appear (more unpredictable).-->
<!-- By contrast, the colour changing one is stronger. Because it is clear and predictable.-->

    <div class="toolbar">
        <button id ="circle-button">draw a new circle</button>
        <fieldset>
            <legend>Pick a new circle colour:</legend>

            <div>
                <input type="radio" id="change-red" name="colourSelect" value="red" checked />
                <label for="change-red">Red</label>
            </div>

            <div>
                <input type="radio" id="change-cornflower" name="colourSelect" value="cornflowerblue" />
                <label for="change-cornflower">Cornflower</label>
            </div>

            <div>
                <input type="radio" id="change-greenyellow" name="colourSelect" value="greenyellow" />
                <label for="change-greenyellow">GreenYellow</label>
            </div>
        </fieldset>

    </div>

    <div class="stagecontainer" id="stage-container">
        <div id="konva-stage"></div>
    </div>

</main>

</body>
</html>
